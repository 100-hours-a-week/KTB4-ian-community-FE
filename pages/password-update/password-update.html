<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PULSE 비밀번호 변경 페이지입니다." />
    <link rel="stylesheet" href="../../styles/tailwind-output.css" />
    <link rel="stylesheet" href="./password-update.css" />
    <script type="module" src="./password-update.js"></script>
    <title>비밀번호 변경 | PULSE</title>
  </head>
  <body>
    <div class="feed-backdrop" aria-hidden="true">
      <aside class="app-lnb">
        <img class="app-lnb__logo" src="../../assets/images/logo.png" alt="" />
        <nav class="app-lnb__group typography-label1-normal-medium">
          <span class="app-lnb__item" aria-current="page"
            ><img
              class="app-lnb__icon"
              src="../../assets/icons/home-fill.svg"
              alt=""
            />피드</span
          ><span class="app-lnb__item"
            ><span class="app-lnb__icon">＋</span>새로운 피드 작성</span
          ><span class="app-lnb__item"
            ><img
              class="app-lnb__icon"
              src="../../assets/icons/receipt-stroke.svg"
              alt=""
            />북마크</span
          >
        </nav>
      </aside>
      <div class="page page-card password-backdrop">
        <h1 class="typography-title3-bold">피드</h1>
        <div class="password-backdrop__media"></div>
      </div>
    </div>
    <main class="modal-page">
      <section
        class="modal-page__dialog password-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="password-title"
      >
        <header class="page-header">
          <a
            class="page-header__back"
            href="../posts/posts.html"
            aria-label="피드로 돌아가기"
            >←</a
          >
          <h1 class="page-title typography-title3-bold" id="password-title">
            비밀번호 변경
          </h1>
        </header>
        <form class="form password-form" data-password-form novalidate>
          <div class="form-field">
            <label class="sr-only" for="current-password">현재 비밀번호</label
            ><input
              class="form-input typography-body3-normal-medium"
              id="current-password"
              name="currentPassword"
              type="password"
              autocomplete="current-password"
              placeholder="현재 비밀번호를 입력하세요"
              aria-describedby="password-help"
            />
          </div>
          <div class="form-field">
            <label class="sr-only" for="password">새로운 비밀번호</label
            ><input
              class="form-input typography-body3-normal-medium"
              id="password"
              name="password"
              type="password"
              autocomplete="new-password"
              placeholder="새로운 비밀번호를 입력하세요"
              aria-describedby="password-error"
            />
            <p
              class="helper-text typography-label2-normal-regular"
              id="password-error"
              data-password-error
            ></p>
          </div>
          <div class="form-field">
            <label class="sr-only" for="password-confirm">비밀번호 확인</label
            ><input
              class="form-input typography-body3-normal-medium"
              id="password-confirm"
              name="passwordConfirm"
              type="password"
              autocomplete="new-password"
              placeholder="비밀번호를 한번 더 입력하세요"
              aria-describedby="password-confirm-error"
            />
            <p
              class="helper-text typography-label2-normal-regular"
              id="password-confirm-error"
              data-password-confirm-error
            ></p>
          </div>
          <p class="helper-text" id="password-help" aria-live="polite">
            현재 비밀번호와 새로운 비밀번호를 모두 입력해 주세요.
          </p>
          <button
            class="button button--primary typography-body1-normal-bold"
            type="submit"
            disabled
          >
            변경하기
          </button>
        </form>
      </section>
    </main>
    <div class="toast" role="status" data-toast></div>
  </body>
</html>

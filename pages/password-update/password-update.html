<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="아무 말 대잔치 커뮤니티 비밀번호 수정 페이지입니다."
  >
  <link rel="stylesheet" href="../../styles/common.css">
  <link rel="stylesheet" href="./password-update.css">
  <script type="module" src="./password-update.js"></script>
  <title>비밀번호 수정 | 아무 말 대잔치</title>
</head>
<body>

<header class="site-header">
  <div class="site-header__inner">

    <a class="site-header__title" href="../posts/posts.html">아무 말 대잔치</a>

    <div class="site-header__profile">
      <button
        class="profile-button"
        type="button"
        aria-label="회원 메뉴 열기"
        aria-haspopup="true"
        aria-expanded="false"
        data-profile-button
      >
        <img src="../../assets/images/profile-default.svg" alt="">
      </button>

      <nav class="profile-menu" aria-label="회원 메뉴" data-profile-menu>
        <a href="../profile-update/profile-update.html">회원정보수정</a>
        <a href="../password-update/password-update.html">비밀번호수정</a>
        <button type="button" data-logout-button>로그아웃</button>
      </nav>
    </div>
  </div>
</header>


  <main class="page page--narrow password-page">
    <section class="password-form" aria-labelledby="password-title">
      <h2 class="page-title" id="password-title">비밀번호 수정</h2>

      <form class="form" data-password-form novalidate>
        <div class="form-field">
          <label class="form-label" for="password">비밀번호</label>
          <input
            class="form-input"
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호를 입력하세요"
            aria-describedby="password-error"
          >
          <p class="helper-text" id="password-error" data-password-error></p>
        </div>

        <div class="form-field">
          <label class="form-label" for="password-confirm">
            비밀번호 확인
          </label>
          <input
            class="form-input"
            id="password-confirm"
            name="passwordConfirm"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호를 한 번 더 입력하세요"
            aria-describedby="password-confirm-error"
          >
          <p
            class="helper-text"
            id="password-confirm-error"
            data-password-confirm-error
          ></p>
        </div>

        <button class="button button--primary" type="submit">
          수정하기
        </button>
      </form>
    </section>
  </main>

  <div class="toast" role="status" data-toast></div>
</body>
</html>

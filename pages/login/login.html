<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PULSE 커뮤니티 로그인 페이지입니다.">
  <link rel="stylesheet" href="../../styles/tailwind-output.css">
  <link rel="stylesheet" href="./login.css">
  <script type="module" src="./login.js"></script>
  <title>로그인 | PULSE</title>
</head>
<body class="auth-body">
  <div class="auth-shell">
    <img class="auth-artwork" src="../../assets/images/loginAndSignup_image.png" alt="">
    <main class="auth-main">
      <section class="auth-panel" aria-labelledby="login-title">
        <img class="auth-logo" src="../../assets/images/logo.png" alt="PULSE">
        <div class="auth-form-group">
          <h1 class="auth-divider typography-body3-normal-medium" id="login-title">로그인</h1>
          <form class="form" data-login-form novalidate>
            <div class="form-field">
              <label class="sr-only" for="email">이메일</label>
              <input class="form-input typography-body3-normal-medium" id="email" name="email" type="email" autocomplete="email" placeholder="이메일을 입력하세요" aria-describedby="email-error">
              <p class="helper-text typography-label2-normal-regular" id="email-error" data-email-error></p>
            </div>
            <div class="form-field">
              <label class="sr-only" for="password">비밀번호</label>
              <input class="form-input typography-body3-normal-medium" id="password" name="password" type="password" autocomplete="current-password" placeholder="비밀번호를 입력하세요" aria-describedby="password-error">
              <p class="helper-text typography-label2-normal-regular" id="password-error" data-password-error></p>
            </div>
            <button class="button button--primary typography-body1-normal-bold" type="submit">로그인</button>
            <a class="text-link typography-body3-normal-regular" href="../signup/signup.html">회원가입 하러가기</a>
          </form>
        </div>
      </section>
    </main>
  </div>
</body>
</html>

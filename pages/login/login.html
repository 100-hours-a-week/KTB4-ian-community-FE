<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="아무 말 대잔치 커뮤니티에 로그인하는 페이지."
  >
  <link rel="stylesheet" href="../../styles/tailwind-output.css">
  <link rel="stylesheet" href="./login.css">
  <script type="module" src="./login.js"></script>
  <title>로그인 | 아무 말 대잔치</title>
</head>
<body>

<header class="site-header">
  <div class="site-header__inner">
    <h1 class="site-header__title">아무 말 대잔치</h1>
  </div>
</header>


  <main class="page page--narrow login-page">
    <section class="login-form" aria-labelledby="login-title">
      <h2 class="page-title" id="login-title">로그인</h2>

      <form class="form" data-login-form novalidate>
        <div class="form-field">
          <label class="form-label" for="email">이메일</label>
          <input
            class="form-input"
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="이메일을 입력하세요"
            aria-describedby="email-error"
          >
          <p class="helper-text" id="email-error" data-email-error></p>
        </div>

        <div class="form-field">
          <label class="form-label" for="password">비밀번호</label>
          <input
            class="form-input"
            id="password"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="비밀번호를 입력하세요"
            aria-describedby="password-error"
          >
          <p class="helper-text" id="password-error" data-password-error></p>
        </div>

        <button class="button button--primary" type="submit">
          로그인
        </button>

        <a class="text-link" href="../signup/signup.html">회원가입</a>
      </form>
    </section>
  </main>
</body>
</html>

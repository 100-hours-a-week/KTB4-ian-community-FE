<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PULSE 프로필 편집 페이지입니다." />
    <link rel="stylesheet" href="../../styles/tailwind-output.css" />
    <link rel="stylesheet" href="./profile-update.css" />
    <script type="module" src="./profile-update.js"></script>
    <title>프로필 편집 | PULSE</title>
  </head>
  <body>
    <div class="feed-backdrop" aria-hidden="true">
      <aside class="app-lnb">
        <img class="app-lnb__logo" src="../../assets/images/logo.png" alt="" />
        <nav class="app-lnb__group typography-label1-normal-medium">
          <span class="app-lnb__item" aria-current="page"
            ><img
              class="app-lnb__icon"
              src="../../assets/icons/home-fill.svg"
              alt=""
            />피드</span
          ><span class="app-lnb__item"
            ><span class="app-lnb__icon">＋</span>새로운 피드 작성</span
          ><span class="app-lnb__item"
            ><img
              class="app-lnb__icon"
              src="../../assets/icons/receipt-stroke.svg"
              alt=""
            />북마크</span
          >
        </nav>
      </aside>
      <div class="page page-card profile-backdrop">
        <h1 class="typography-title3-bold">피드</h1>
        <div class="profile-backdrop__prompt"></div>
        <div class="profile-backdrop__media"></div>
      </div>
    </div>
    <main class="modal-page">
      <section
        class="modal-page__dialog profile-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="profile-title"
      >
        <header class="page-header">
          <a
            class="page-header__back"
            href="../posts/posts.html"
            aria-label="피드로 돌아가기"
            >←</a
          >
          <h1 class="page-title typography-title3-bold" id="profile-title">
            프로필 편집
          </h1>
        </header>
        <form class="form profile-form" data-profile-form novalidate>
          <div class="avatar-upload">
            <div class="avatar">
              <img
                src="../../assets/images/profile-default.svg"
                alt="현재 프로필 이미지"
                data-profile-preview
              />
            </div>
            <label
              class="avatar-upload__button"
              for="profile-image"
              aria-label="프로필 사진 변경"
              ><img src="../../assets/icons/edit_profile_image.svg" alt=""
            /></label>
            <input
              class="file-input"
              id="profile-image"
              name="profileImage"
              type="file"
              accept="image/png,image/jpeg,image/webp"
              data-profile-input
            />
          </div>
          <div class="form-field">
            <span class="sr-only">이메일</span>
            <p class="typography-body3-normal-medium" data-email>
              email@email.com
            </p>
          </div>
          <div class="form-field">
            <label class="sr-only" for="nickname">닉네임</label
            ><input
              class="form-input typography-body3-normal-medium"
              id="nickname"
              name="nickname"
              type="text"
              maxlength="10"
              value="더미 작성자 1"
              placeholder="닉네임"
              aria-describedby="nickname-error"
            />
            <p
              class="helper-text typography-label2-normal-regular"
              id="nickname-error"
              data-nickname-error
            ></p>
          </div>
          <button
            class="button button--primary typography-body1-normal-bold"
            type="submit"
          >
            저장하기
          </button>
        </form>
        <div class="profile-delete">
          <button
            class="typography-body3-normal-regular"
            type="button"
            data-delete-account
          >
            회원탈퇴
          </button>
        </div>
      </section>
    </main>
    <div class="modal" data-delete-modal>
      <div
        class="modal__dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="delete-user-title"
      >
        <h2 class="modal__title typography-title3-bold" id="delete-user-title">
          회원 탈퇴 하시겠습니까?
        </h2>
        <p class="modal__description typography-body3-normal-regular">
          작성한 게시글과 댓글은 유지될 수 있습니다.
        </p>
        <div class="modal__actions">
          <button class="button button--dark" type="button" data-cancel-delete>
            취소</button
          ><button
            class="button button--primary"
            type="button"
            data-confirm-delete
          >
            확인
          </button>
        </div>
      </div>
    </div>
    <div class="toast" role="status" data-toast></div>
  </body>
</html>

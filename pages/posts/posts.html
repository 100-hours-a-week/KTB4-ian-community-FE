<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="아무 말 대잔치 커뮤니티 게시글 목록입니다."
  >
  <link rel="stylesheet" href="../../styles/common.css">
  <link rel="stylesheet" href="./posts.css">
  <script type="module" src="./posts.js"></script>
  <title>게시글 목록 | 아무 말 대잔치</title>
</head>
<body>

<header class="site-header">
  <div class="site-header__inner">

    <a class="site-header__title" href="../posts/posts.html">아무 말 대잔치</a>

    <div class="site-header__profile">
      <button
        class="profile-button"
        type="button"
        aria-label="회원 메뉴 열기"
        aria-haspopup="true"
        aria-expanded="false"
        data-profile-button
      >
        <img src="../../assets/images/profile-default.svg" alt="">
      </button>

      <nav class="profile-menu" aria-label="회원 메뉴" data-profile-menu>
        <a href="../profile-update/profile-update.html">회원정보수정</a>
        <a href="../password-update/password-update.html">비밀번호수정</a>
        <button type="button" data-logout-button>로그아웃</button>
      </nav>
    </div>
  </div>
</header>


  <main class="page">
    <section aria-labelledby="posts-title">
      <div class="posts-intro">
        <h2 class="sr-only" id="posts-title">게시글 목록</h2>
        <p>안녕하세요,</p>
        <strong>아무 말 대잔치 게시판 입니다.</strong>
      </div>

      <div class="posts-toolbar">
        <a class="button button--primary" href="../post-create/post-create.html">
          게시글 작성
        </a>
      </div>

      <div class="post-list" data-post-list aria-live="polite"></div>
    </section>
  </main>
</body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PULSE 커뮤니티 피드입니다." />
    <link rel="stylesheet" href="../../styles/tailwind-output.css" />
    <link rel="stylesheet" href="./posts.css" />
    <script src="../../assets/vendor/dayjs/dayjs.min.js"></script>
    <script type="module" src="./posts.js"></script>
    <title>피드 | PULSE</title>
  </head>
  <body>
    <aside data-app-lnb></aside>

    <main class="page page-card">
      <section aria-labelledby="posts-title">
        <header class="posts-header">
          <h1 class="page-title typography-title3-bold" id="posts-title">
            피드
          </h1>
          <div class="posts-prompt">
            <div class="posts-prompt__message typography-label1-normal-medium">
              <img
                class="avatar--small"
                src="../../assets/images/profile-default.svg"
                alt=""
              />
              <span>새로운 게시물을 작성해보세요</span>
            </div>
            <button
              class="button button--outline typography-label2-normal-semibold"
              data-open-create
              type="button"
            >
              피드 게시하기
            </button>
          </div>
        </header>
        <div class="post-list" data-post-list aria-live="polite"></div>
      </section>
    </main>
    <div
      class="modal modal--editor"
      data-create-modal
      hidden
      aria-labelledby="create-title"
    >
      <section class="modal__dialog" tabindex="-1">
        <header class="modal__header">
          <h2 class="typography-body1-normal-bold" id="create-title">
            피드 작성
          </h2>
          <button type="button" data-close-create>취소</button>
        </header>
        <form class="feed-editor form" id="create-form">
          <div class="feed-editor__body">
            <div class="feed-editor__identity">
              <img class="avatar--small" data-editor-avatar alt="" /><strong
                data-editor-name
                >알 수 없음</strong
              >
            </div>
            <img
              class="feed-editor__preview"
              data-image-preview
              hidden
              alt="첨부 이미지 미리보기"
            /><textarea
              class="form-textarea"
              name="content"
              maxlength="2000"
              placeholder="무슨 생각을 하고 계신가요?"
              aria-label="피드 본문"
            ></textarea>
            <p class="helper-text" data-create-error></p>
          </div>
          <div class="feed-editor__footer">
            <div class="feed-editor__actions">
              <label class="feed-editor__camera" for="feed-image">
                <img src="../../assets/icons/Camera.svg" alt="" />
                <span class="sr-only">이미지 선택</span>
              </label>
              <input
                class="file-input"
                id="feed-image"
                name="image"
                type="file"
                accept="image/png,image/jpeg,image/webp"
              />
              <button
                class="feed-editor__submit submit-icon"
                data-submit-create
                type="submit"
                disabled
                aria-label="피드 게시"
              >
                <span aria-hidden="true"></span>
              </button>
            </div>
          </div>
        </form>
      </section>
    </div>
    <div class="modal" data-logout-modal hidden aria-labelledby="logout-title">
      <section class="modal__dialog" tabindex="-1">
        <h2 class="modal__title typography-heading-1-bold" id="logout-title">
          로그아웃할까요?
        </h2>
        <p class="modal__description">현재 계정에서 로그아웃합니다.</p>
        <div class="modal__actions">
          <button class="button button--outline" data-cancel-logout>취소</button
          ><button class="button button--dark" data-confirm-logout>
            로그아웃
          </button>
        </div>
      </section>
    </div>
    <div class="toast" data-toast role="status"></div>
    <noscript>피드를 보려면 JavaScript를 활성화해주세요.</noscript>
  </body>
</html>

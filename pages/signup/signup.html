<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PULSE 커뮤니티 회원가입 페이지입니다.">
  <link rel="stylesheet" href="../../styles/tailwind-output.css">
  <link rel="stylesheet" href="./signup.css">
  <script type="module" src="./signup.js"></script>
  <title>회원가입 | PULSE</title>
</head>
<body class="auth-body">
  <div class="auth-shell">
    <img class="auth-artwork" src="../../assets/images/loginAndSignup_image.png" alt="">
    <main class="auth-main">
      <section class="auth-panel signup-panel" aria-labelledby="signup-title">
        <img class="auth-logo" src="../../assets/images/logo.png" alt="PULSE">
        <div class="auth-form-group">
          <h1 class="auth-divider typography-body3-normal-medium" id="signup-title">회원가입</h1>
          <form class="form" data-signup-form novalidate>
            <div class="sr-only">
              <label for="profile-image">프로필 사진</label>
              <input id="profile-image" name="profileImage" type="file" accept="image/png,image/jpeg,image/webp" data-profile-input>
              <img src="../../assets/images/profile-default.svg" alt="선택한 프로필 미리보기" data-profile-preview>
              <p data-profile-error></p>
            </div>
            <div class="form-field">
              <label class="sr-only" for="email">이메일</label>
              <input class="form-input typography-body3-normal-medium" id="email" name="email" type="email" autocomplete="email" placeholder="이메일을 입력하세요" aria-describedby="email-error">
              <p class="helper-text typography-label2-normal-regular" id="email-error" data-email-error></p>
            </div>
            <div class="form-field">
              <label class="sr-only" for="password">비밀번호</label>
              <input class="form-input typography-body3-normal-medium" id="password" name="password" type="password" autocomplete="new-password" placeholder="비밀번호를 입력하세요" aria-describedby="password-error">
              <p class="helper-text typography-label2-normal-regular" id="password-error" data-password-error></p>
            </div>
            <div class="form-field">
              <label class="sr-only" for="password-confirm">비밀번호 확인</label>
              <input class="form-input typography-body3-normal-medium" id="password-confirm" name="passwordConfirm" type="password" autocomplete="new-password" placeholder="비밀번호를 한번 더 입력하세요" aria-describedby="password-confirm-error">
              <p class="helper-text typography-label2-normal-regular" id="password-confirm-error" data-password-confirm-error></p>
            </div>
            <div class="form-field">
              <label class="sr-only" for="nickname">닉네임</label>
              <input class="form-input typography-body3-normal-medium" id="nickname" name="nickname" type="text" maxlength="10" autocomplete="nickname" placeholder="닉네임을 입력하세요" aria-describedby="nickname-error">
              <p class="helper-text typography-label2-normal-regular" id="nickname-error" data-nickname-error></p>
            </div>
            <button class="button button--primary typography-body1-normal-bold" type="submit">회원가입</button>
            <a class="text-link typography-body3-normal-regular" href="../login/login.html">로그인 하러가기</a>
          </form>
        </div>
      </section>
    </main>
  </div>
</body>
</html>

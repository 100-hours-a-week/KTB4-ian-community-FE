<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="아무 말 대잔치 커뮤니티 회원가입 페이지입니다."
  >
  <link rel="stylesheet" href="../../styles/tailwind-output.css">
  <link rel="stylesheet" href="./signup.css">
  <script type="module" src="./signup.js"></script>
  <title>회원가입 | 아무 말 대잔치</title>
</head>
<body>
  <header class="site-header">
    <div class="site-header__inner">
      <button
        class="site-header__back"
        type="button"
        aria-label="로그인 페이지로 이동"
        data-back-button
      >
        ‹
      </button>
      <h1 class="site-header__title">아무 말 대잔치</h1>
    </div>
  </header>

  <main class="page page--narrow signup-page">
    <section aria-labelledby="signup-title">
      <h2 class="page-title" id="signup-title">회원가입</h2>

      <form class="form signup-form" data-signup-form novalidate>
        <div class="signup-profile">
          <span class="form-label">프로필 사진</span>
          <p class="helper-text" data-profile-error></p>

          <div class="avatar-upload">
            <div class="avatar">
              <img
                src="../../assets/images/profile-default.svg"
                alt="선택한 프로필 미리보기"
                data-profile-preview
              >
            </div>
            <label class="avatar-upload__button" for="profile-image">+</label>
            <input
              class="file-input"
              id="profile-image"
              name="profileImage"
              type="file"
              accept="image/png,image/jpeg,image/webp"
              data-profile-input
            >
          </div>
        </div>

        <div class="form-field">
          <label class="form-label" for="email">이메일*</label>
          <input
            class="form-input"
            id="email"
            name="email"
            type="email"
            autocomplete="email"
            placeholder="이메일을 입력하세요"
            aria-describedby="email-error"
          >
          <p class="helper-text" id="email-error" data-email-error></p>
        </div>

        <div class="form-field">
          <label class="form-label" for="password">비밀번호*</label>
          <input
            class="form-input"
            id="password"
            name="password"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호를 입력하세요"
            aria-describedby="password-error"
          >
          <p class="helper-text" id="password-error" data-password-error></p>
        </div>

        <div class="form-field">
          <label class="form-label" for="password-confirm">
            비밀번호 확인*
          </label>
          <input
            class="form-input"
            id="password-confirm"
            name="passwordConfirm"
            type="password"
            autocomplete="new-password"
            placeholder="비밀번호를 한 번 더 입력하세요"
            aria-describedby="password-confirm-error"
          >
          <p
            class="helper-text"
            id="password-confirm-error"
            data-password-confirm-error
          ></p>
        </div>

        <div class="form-field">
          <label class="form-label" for="nickname">닉네임*</label>
          <input
            class="form-input"
            id="nickname"
            name="nickname"
            type="text"
            maxlength="10"
            autocomplete="nickname"
            placeholder="닉네임을 입력하세요"
            aria-describedby="nickname-error"
          >
          <p class="helper-text" id="nickname-error" data-nickname-error></p>
        </div>

        <button class="button button--primary" type="submit">
          회원가입
        </button>

        <a class="text-link" href="../login/login.html">로그인하러 가기</a>
      </form>
    </section>
  </main>
</body>
</html>

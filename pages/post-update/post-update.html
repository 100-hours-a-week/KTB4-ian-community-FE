<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    name="description"
    content="아무 말 대잔치 커뮤니티 게시글 수정 페이지입니다."
  >
  <link rel="stylesheet" href="../../styles/common.css">
  <link rel="stylesheet" href="./post-update.css">
  <script type="module" src="./post-update.js"></script>
  <title>게시글 수정 | 아무 말 대잔치</title>
</head>
<body>

<header class="site-header">
  <div class="site-header__inner">

    <button
      class="site-header__back"
      type="button"
      aria-label="이전 페이지로 이동"
      data-back-button
    >
      ‹
    </button>

    <a class="site-header__title" href="../posts/posts.html">아무 말 대잔치</a>

    <div class="site-header__profile">
      <button
        class="profile-button"
        type="button"
        aria-label="회원 메뉴 열기"
        aria-haspopup="true"
        aria-expanded="false"
        data-profile-button
      >
        <img src="../../assets/images/profile-default.svg" alt="">
      </button>

      <nav class="profile-menu" aria-label="회원 메뉴" data-profile-menu>
        <a href="../profile-update/profile-update.html">회원정보수정</a>
        <a href="../password-update/password-update.html">비밀번호수정</a>
        <button type="button" data-logout-button>로그아웃</button>
      </nav>
    </div>
  </div>
</header>


  <main class="page">
    <section class="post-editor" aria-labelledby="update-title">
      <h2 class="page-title" id="update-title">게시글 수정</h2>

      <form class="form" data-post-form novalidate>
        <div class="form-field">
          <label class="form-label" for="title">제목*</label>
          <input
            class="form-input"
            id="title"
            name="title"
            type="text"
            maxlength="26"
            aria-describedby="title-error"
          >
          <p class="helper-text" id="title-error" data-title-error></p>
        </div>

        <div class="form-field">
          <label class="form-label" for="content">내용*</label>
          <textarea
            class="form-textarea"
            id="content"
            name="content"
            aria-describedby="content-error"
          ></textarea>
          <p class="helper-text" id="content-error" data-content-error></p>
        </div>

        <div class="form-field">
          <span class="form-label">현재 이미지</span>
          <div class="post-editor__image">
            <img
              src="../../assets/images/post-placeholder.svg"
              alt="현재 게시글 이미지"
              data-current-image
            >
          </div>
        </div>

        <div class="form-field">
          <label class="form-label" for="image">이미지 변경</label>
          <input
            class="post-editor__file"
            id="image"
            name="image"
            type="file"
            accept="image/png,image/jpeg,image/webp"
            data-image-input
          >
        </div>

        <button class="button button--primary" type="submit">
          수정하기
        </button>
      </form>
    </section>
  </main>

  <div class="toast" role="status" data-toast></div>
</body>
</html>
